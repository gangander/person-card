<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="記事卡">
<meta name="theme-color" content="#171923">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="manifest" href="manifest.json">
<title>檔案 · 一個人的記事卡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Noto+Serif+TC:wght@500;700&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#171923;
    --paper:#F6F0E4;
    --paper-2:#ECE1CB;
    --ink:#241F1B;
    --ink-soft:#6B6255;
    --accent:#9C4A3C;      /* sienna — headings, name */
    --accent-2:#3F5D54;    /* muted sage — links / contact */
    --gold:#B8935A;
    --line:#D9CBAE;
    --danger:#9C4A3C;
    --radius:18px;
  }
  html[data-theme="indigo"]{
    --bg:#12101C; --paper:#EDE9F7; --paper-2:#E1DAF0;
    --ink:#241E38; --ink-soft:#6B6285;
    --accent:#5D4B8C; --accent-2:#3E5C82; --gold:#9C86D9; --line:#D6CBEF;
  }
  html[data-theme="blush"]{
    --bg:#1F1620; --paper:#FBEDEF; --paper-2:#F5DEE1;
    --ink:#3A2027; --ink-soft:#8C6B71;
    --accent:#B4485E; --accent-2:#8C6E4B; --gold:#D68FA0; --line:#EFC9D0;
  }
  html[data-theme="forest"]{
    --bg:#101914; --paper:#EFEEE1; --paper-2:#E3E0CB;
    --ink:#1F2A22; --ink-soft:#5E6E5F;
    --accent:#3F6B4A; --accent-2:#7A5C3E; --gold:#8CAA6E; --line:#CFD6BC;
  }
  body, .card, .btn{
    transition: background-color .25s ease, color .25s ease, border-color .25s ease;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(ellipse at 20% -10%, #23283a 0%, transparent 55%),
      radial-gradient(ellipse at 100% 110%, #1c2030 0%, transparent 50%),
      var(--bg);
    font-family:'Noto Sans TC','IBM Plex Mono',sans-serif;
    color:var(--ink);
    padding:32px 16px 80px;
    display:flex;
    justify-content:center;
  }
  .wrap{width:100%;max-width:480px;}

  /* ---- top bar ---- */
  .topbar{
    margin-bottom:14px;padding:0 4px;
  }
  .topbar-main{
    display:flex;justify-content:space-between;align-items:center;
    gap:12px;
  }
  .topbar .brand{
    color:#B9B2C7;font-size:12px;letter-spacing:.14em;text-transform:uppercase;
    font-family:'IBM Plex Mono',monospace;
  }
  .topbar-main .btn{
    min-height:40px;padding:0 20px;font-size:14px;flex:0 0 auto;
  }
  .topbar-sub{
    display:flex;gap:8px;margin-top:10px;
  }
  .topbar-sub .btn{
    flex:1;min-height:38px;padding:0 10px;
  }
  .btn{
    font-family:'Noto Sans TC',sans-serif;
    font-size:13px;font-weight:600;
    border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.06);
    color:#EDE7F5;
    padding:8px 14px;border-radius:999px;
    cursor:pointer;
    transition:background .15s ease, transform .1s ease;
    display:inline-flex;align-items:center;justify-content:center;
  }
  .btn:hover{background:rgba(255,255,255,.12);}
  .btn:active{transform:scale(.97);}
  .btn.primary{
    background:var(--accent);border-color:var(--accent);color:#fff;
  }
  .btn.primary:hover{background:#8a3f33;}
  .btn.subtle{
    background:rgba(255,255,255,.03);
    color:#B9B2C7;font-size:12.5px;font-weight:500;
  }
  .btn.ghost-danger{
    border-color:rgba(220,120,100,.35); color:#E7A79A;
  }

  /* ---- card / index-card record ---- */
  .card{
    position:relative;
    background:var(--paper);
    border-radius:var(--radius);
    padding:34px 26px 26px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,.55), 0 2px 0 rgba(255,255,255,.5) inset;
    background-image:
      radial-gradient(circle, rgba(0,0,0,.05) 1px, transparent 1.4px);
    background-size:14px 14px;
  }
  .tab{
    position:absolute;
    top:-16px;left:26px;
    background:var(--accent-2);
    color:#F3F1E6;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;letter-spacing:.08em;
    padding:6px 14px 5px;
    border-radius:8px 8px 0 0;
  }
  .punch{
    position:absolute; top:14px; right:22px;
    display:flex; gap:8px;
  }
  .punch span{
    width:9px;height:9px;border-radius:50%;
    background:var(--bg);
    box-shadow:0 1px 1px rgba(0,0,0,.25) inset;
  }

  .name-row{margin-bottom:4px;}

  .header-flex{
    display:flex;align-items:center;gap:16px;
    padding-right:60px;
  }
  .portrait-wrap{
    position:relative;flex:0 0 auto;
    width:66px;height:66px;border-radius:50%;
    overflow:hidden;
    border:2px solid var(--gold);
    background:var(--paper-2);
    display:flex;align-items:center;justify-content:center;
    cursor:default;
  }
  .portrait-wrap.editable{cursor:pointer;}
  .portrait-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
  .portrait-wrap .placeholder{
    font-size:24px;color:var(--ink-soft);opacity:.5;
    font-family:'IBM Plex Mono',monospace;
  }
  .portrait-wrap .remove-photo{
    position:absolute;bottom:-2px;right:-2px;
    width:20px;height:20px;border-radius:50%;
    background:var(--accent);color:#fff;border:none;
    font-size:11px;line-height:20px;text-align:center;padding:0;
    cursor:pointer;
  }
  .header-text{flex:1;min-width:0;}

  .gallery-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
    margin-top:4px;
  }
  .gallery-tile{
    position:relative;aspect-ratio:1/1;border-radius:10px;overflow:hidden;
    background:var(--paper-2);border:1px solid var(--line);
  }
  .gallery-tile img{width:100%;height:100%;object-fit:cover;display:block;}
  .gallery-tile.add-tile{
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;border:1px dashed var(--line);background:transparent;
    color:var(--ink-soft);font-size:22px;font-family:'IBM Plex Mono',monospace;
  }
  .gallery-tile .remove-photo{
    position:absolute;top:4px;right:4px;
    width:20px;height:20px;border-radius:50%;
    background:rgba(36,31,27,.72);color:#fff;border:none;
    font-size:11px;line-height:20px;text-align:center;padding:0;cursor:pointer;
  }
  .gallery-empty{
    font-family:'IBM Plex Mono',monospace;font-size:12px;color:#B9AF9C;
    font-style:italic;padding:6px 0;
  }

  .icon-btn{
    min-height:40px;min-width:40px;padding:0;font-size:17px;
    background:rgba(255,255,255,.06);
  }

  .lock-overlay, .lock-settings-overlay{
    position:fixed;inset:0;z-index:999;
    background:rgba(10,9,15,.88);
    backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .lock-card, .lock-settings-card{
    width:100%;max-width:380px;
    background:var(--paper);
    border-radius:var(--radius);
    padding:32px 26px;
    text-align:center;
    box-shadow:0 30px 60px -20px rgba(0,0,0,.6);
  }
  .lock-settings-card{text-align:left;}
  .lock-icon{font-size:36px;margin-bottom:6px;}
  .lock-title{
    font-family:'Noto Serif TC',serif;font-weight:700;font-size:20px;
    color:var(--ink);margin-bottom:4px;
  }
  .lock-sub{
    font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);
    margin-bottom:20px;
  }
  .lock-bio-btn{width:100%;margin-bottom:16px;min-height:46px;}
  .lock-pin-row{display:flex;gap:8px;}
  .lock-pin-input{
    flex:1;font-family:'IBM Plex Mono',monospace;font-size:16px;letter-spacing:.2em;
    text-align:center;background:var(--paper-2);border:1px solid var(--line);
    border-radius:8px;padding:10px 8px;color:var(--ink);
  }
  .lock-pin-row .btn{flex:0 0 auto;min-height:44px;}
  .lock-error{
    margin-top:12px;font-size:12px;color:var(--danger);min-height:16px;
    font-family:'Noto Sans TC',sans-serif;
  }

  .name{
    font-family:'Noto Serif TC',serif;
    font-weight:700;font-size:30px;color:var(--ink);
    line-height:1.15;
    display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;
  }
  .name input{
    font:inherit;color:inherit;background:transparent;border:none;
    border-bottom:1px dashed var(--line);width:100%;padding:2px 0;
  }
  .subtitle{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;color:var(--accent);
    letter-spacing:.06em;
    margin-top:2px;
  }
  .subtitle input{
    font:inherit;color:inherit;background:transparent;border:none;
    border-bottom:1px dashed var(--line);
  }

  .divider{
    border:none;border-top:1px dashed var(--line);
    margin:20px 0 14px;
  }

  .section-title{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--gold);
    margin:22px 0 8px;
    display:flex;align-items:center;gap:8px;
  }
  .section-title::after{
    content:'';flex:1;border-top:1px solid var(--line);
  }

  .row{
    display:flex;gap:14px;padding:9px 0;
    border-bottom:1px dotted var(--line);
    align-items:flex-start;
  }
  .row:last-child{border-bottom:none;}
  .row .label{
    flex:0 0 78px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;color:var(--ink-soft);
    padding-top:2px;
  }
  .row .value{
    flex:1;
    font-family:'IBM Plex Mono',monospace;
    font-size:13.5px;color:var(--ink);
    text-align:right;
    white-space:pre-line;
    word-break:break-word;
  }
  .row .value a{color:var(--accent-2);text-decoration:none;border-bottom:1px solid currentColor;}
  .row.empty .value{color:#B9AF9C;font-style:italic;}

  .row input, .row textarea{
    width:100%;
    font-family:'IBM Plex Mono',monospace;font-size:13.5px;color:var(--ink);
    text-align:right;
    background:var(--paper-2);
    border:1px solid var(--line);border-radius:6px;
    padding:6px 8px;resize:vertical;
  }
  .row textarea{min-height:44px;line-height:1.5;}
  .row .del-field{
    flex:0 0 auto;align-self:center;
    background:none;border:none;color:#B9887E;font-size:16px;cursor:pointer;
    padding:2px 4px;
  }

  .hint{
    font-family:'Noto Sans TC',sans-serif;
    font-size:11px;color:var(--ink-soft);opacity:.75;
    margin-top:4px;
  }

  .link-row{padding:9px 0;border-bottom:1px dotted var(--line);}
  .link-row:last-child{border-bottom:none;}
  .link-line{display:flex;justify-content:space-between;gap:10px;align-items:center;}
  .link-label{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);}
  .link-value a{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--accent-2);word-break:break-all;text-align:right;text-decoration:none;border-bottom:1px solid currentColor;}
  .link-edit{display:flex;gap:6px;margin-top:6px;}
  .link-edit input{flex:1;font-family:'IBM Plex Mono',monospace;font-size:12.5px;background:var(--paper-2);border:1px solid var(--line);border-radius:6px;padding:6px 8px;}
  .link-edit input.label-input{flex:0 0 80px;}

  .add-row{
    display:flex;justify-content:center;margin-top:10px;
  }
  .add-row button{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;color:var(--accent-2);
    background:none;border:1px dashed var(--line);
    border-radius:8px;padding:8px 16px;cursor:pointer;width:100%;
  }
  .add-row button:hover{background:rgba(63,93,84,.06);}

  .footer-stamp{
    text-align:center;margin-top:26px;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;color:#B9AF9C;letter-spacing:.08em;
  }

  .action-bar{
    display:flex;gap:10px;margin-top:18px;
  }
  .action-bar .btn{flex:1;text-align:center;}

  .theme-row{
    display:flex;gap:10px;justify-content:center;
    margin-bottom:16px;
  }
  .swatch{
    width:30px;height:30px;border-radius:50%;
    border:2px solid rgba(255,255,255,.15);
    cursor:pointer;padding:0;
    position:relative;
    box-shadow:0 2px 6px rgba(0,0,0,.35);
  }
  .swatch.active{border-color:#fff;box-shadow:0 0 0 2px var(--gold, #B8935A);}
  .swatch[data-theme="classic"]{background:linear-gradient(135deg,#F6F0E4 50%,#9C4A3C 50%);}
  .swatch[data-theme="indigo"]{background:linear-gradient(135deg,#EDE9F7 50%,#5D4B8C 50%);}
  .swatch[data-theme="blush"]{background:linear-gradient(135deg,#FBEDEF 50%,#B4485E 50%);}
  .swatch[data-theme="forest"]{background:linear-gradient(135deg,#EFEEE1 50%,#3F6B4A 50%);}

  @media (max-width:400px){
    .row .label{flex-basis:64px;}
  }
</style>
</head>
<body>

<div class="lock-overlay" id="lockOverlay" style="display:none;">
  <div class="lock-card">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">已鎖定</div>
    <div class="lock-sub">請驗證身份以繼續</div>
    <button class="btn primary lock-bio-btn" id="lockBioBtn" style="display:none;">使用 Face ID／Touch ID 解鎖</button>
    <div class="lock-pin-row">
      <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="8" id="lockPinInput" placeholder="輸入密碼" class="lock-pin-input">
      <button class="btn primary" id="lockPinSubmit">解鎖</button>
    </div>
    <div class="lock-error" id="lockError"></div>
  </div>
</div>

<div class="lock-settings-overlay" id="lockSettingsOverlay" style="display:none;">
  <div class="lock-settings-card">
    <div class="section-title" style="margin-top:0;">鎖定設定</div>
    <div id="lockSettingsBody"></div>
    <div class="action-bar">
      <button class="btn primary" id="lockSettingsSave">儲存</button>
      <button class="btn" id="lockSettingsClose">關閉</button>
    </div>
  </div>
</div>

<div class="wrap">

  <div class="topbar">
    <div class="topbar-main">
      <div class="brand">個人記事檔案</div>
      <div style="display:flex;gap:8px;">
        <button class="btn icon-btn" id="lockSettingsBtn" title="鎖定設定">🔒</button>
        <button class="btn primary" id="editToggle">編輯</button>
      </div>
    </div>
    <div class="topbar-sub">
      <button class="btn subtle" id="exportBtn">匯出備份</button>
      <button class="btn subtle" id="importBtn">匯入備份</button>
      <input type="file" id="importFile" accept="application/json" style="display:none;">
    </div>
  </div>

  <div class="theme-row" id="themeRow"></div>

  <div class="card" id="card">
    <div class="tab" id="tabLabel">寶貝</div>
    <div class="punch"><span></span><span></span></div>

    <div class="header-flex">
      <div class="portrait-wrap" id="portraitWrap">
        <span class="placeholder" id="portraitPlaceholder">＋</span>
        <img id="portraitImg" style="display:none;" alt="大頭照">
      </div>
      <div class="header-text">
        <div class="name-row">
          <div class="name" id="nameDisplay"></div>
        </div>
        <div class="subtitle" id="subtitleDisplay"></div>
      </div>
    </div>
    <input type="file" id="portraitFile" accept="image/*" style="display:none;">

    <hr class="divider">

    <div class="section-title">基本資料</div>
    <div id="basicFields"></div>

    <div class="section-title">聯絡與社群</div>
    <div id="linkFields"></div>
    <div class="add-row" id="addLinkRow" style="display:none;">
      <button id="addLinkBtn">+ 新增連結</button>
    </div>

    <div class="section-title">生活細節</div>
    <div id="lifeFields"></div>

    <div class="section-title">關於我們</div>
    <div id="usFields"></div>

    <div class="section-title">其他記錄</div>
    <div id="customFields"></div>
    <div class="add-row" id="addCustomRow" style="display:none;">
      <button id="addCustomBtn">+ 新增自訂欄位</button>
    </div>

    <div class="section-title">回憶相簿</div>
    <div class="gallery-grid" id="galleryGrid"></div>
    <input type="file" id="galleryFile" accept="image/*" multiple style="display:none;">

    <div class="footer-stamp" id="stamp">尚未建立記錄</div>
  </div>

  <div class="action-bar" id="editActionBar" style="display:none;">
    <button class="btn primary" id="saveBtn">儲存</button>
    <button class="btn ghost-danger" id="resetBtn">清空重來</button>
  </div>

</div>

<script>
const STORAGE_KEY = 'person-card-profile';
const LOCK_KEY = 'person-card-lock';

let lockSettings = { enabled:false, salt:null, pinHash:null, useBiometric:false, credId:null };
let sessionUnlocked = false;
let hiddenAt = null;

const BASIC_DEFS = [
  {key:'nickname', label:'暱稱'},
  {key:'birthday', label:'生日', type:'date'},
  {key:'gender', label:'性別'},
  {key:'height', label:'身高'},
  {key:'mbti', label:'MBTI'},
  {key:'job', label:'職業'},
  {key:'company', label:'公司'},
  {key:'address', label:'住址'},
];

const LIFE_DEFS = [
  {key:'pet', label:'寵物'},
  {key:'medication', label:'用藥'},
  {key:'spicy', label:'辣度'},
  {key:'music', label:'音樂'},
  {key:'dislikes', label:'不吃 / 不喜歡', type:'list'},
  {key:'likes', label:'喜歡的食物', type:'list'},
  {key:'interests', label:'興趣', type:'list'},
];

const US_DEFS = [
  {key:'relationship', label:'關係'},
  {key:'metHow', label:'怎麼認識'},
  {key:'anniversary', label:'紀念日', type:'date'},
];

function defaultProfile(){
  return {
    name:'', tag:'寶貝', subtitle:'',
    theme:'classic', photo:'', gallery:[],
    basic:{}, life:{}, us:{},
    links:[], custom:[],
    updatedAt:null
  };
}

let profile = defaultProfile();
let editing = false;

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      profile = Object.assign(defaultProfile(), JSON.parse(raw));
    }
  }catch(e){
    profile = defaultProfile();
  }
  editing = false;
  render();
}

function save(){
  profile.updatedAt = new Date().toISOString();
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(profile));
  }catch(e){
    console.error('儲存失敗', e);
    alert('這台裝置的瀏覽器儲存空間可能已滿，或處於無痕模式導致無法儲存。');
    return;
  }
  editing = false;
  render();
}

function silentSave(){
  profile.updatedAt = new Date().toISOString();
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(profile));
  }catch(e){
    console.error('儲存失敗', e);
    alert('照片可能太多、儲存空間不夠了，建議刪除幾張舊照片再試一次。');
    return;
  }
  render();
}

function compressImage(file, maxDim, quality){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let {width, height} = img;
        if(width > height){
          if(width > maxDim){ height = Math.round(height * maxDim / width); width = maxDim; }
        }else{
          if(height > maxDim){ width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => reject(new Error('圖片解析失敗'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('檔案讀取失敗'));
    reader.readAsDataURL(file);
  });
}

async function exportBackup(){
  const jsonStr = JSON.stringify(profile, null, 2);
  const stamp = new Date().toISOString().slice(0,10);
  const filename = `記事卡備份_${(profile.name||'未命名')}_${stamp}.json`;

  // iOS / iPhone: prefer native Share Sheet (Save to Files, AirDrop, Messages...)
  try{
    const file = new File([jsonStr], filename, {type:'application/json'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:'記事卡備份'});
      return;
    }
  }catch(e){
    if(e && e.name === 'AbortError') return; // user cancelled share sheet, do nothing
    // otherwise fall through to download fallback
  }

  // Fallback: normal browser download (desktop / older iOS in a full Safari tab)
  const blob = new Blob([jsonStr], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function importBackup(file){
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      profile = Object.assign(defaultProfile(), parsed);
      save();
      alert('已還原備份');
    }catch(e){
      alert('這個檔案看起來不是有效的備份檔');
    }
  };
  reader.readAsText(file);
}

function zodiacWestern(m,d){
  const table = [
    [1,20,'摩羯座'],[2,19,'水瓶座'],[3,21,'雙魚座'],[4,20,'牡羊座'],
    [5,21,'金牛座'],[6,21,'雙子座'],[7,23,'巨蟹座'],[8,23,'獅子座'],
    [9,23,'處女座'],[10,23,'天秤座'],[11,22,'天蠍座'],[12,22,'射手座']
  ];
  const idx = m-1;
  const [, cutoff, sign] = table[idx];
  if(d < cutoff){
    const prev = table[(idx+11)%12];
    return prev[2];
  }
  return sign;
}
function chineseZodiac(y){
  const animals = ['鼠','牛','虎','兔','龍','蛇','馬','羊','猴','雞','狗','豬'];
  return animals[(y - 4) % 12];
}

function fmtDate(str){
  if(!str) return '';
  const d = new Date(str+'T00:00:00');
  if(isNaN(d)) return str;
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function esc(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function autolink(url){
  const safe = /^https?:\/\//i.test(url);
  if(!safe) return esc(url);
  return `<a href="${esc(url)}" target="_blank" rel="noopener">${esc(url)}</a>`;
}

function render(){
  document.documentElement.dataset.theme = profile.theme || 'classic';
  renderThemeRow();

  document.getElementById('editToggle').textContent = editing ? '取消' : '編輯';
  document.getElementById('editActionBar').style.display = editing ? 'flex' : 'none';
  document.getElementById('addLinkRow').style.display = editing ? 'flex' : 'none';
  document.getElementById('addCustomRow').style.display = editing ? 'flex' : 'none';

  renderHeader();
  renderPortrait();
  renderGallery();
  renderGroup('basicFields', BASIC_DEFS, profile.basic);
  renderLinks();
  renderGroup('lifeFields', LIFE_DEFS, profile.life);
  renderGroup('usFields', US_DEFS, profile.us);
  renderCustom();

  const stamp = document.getElementById('stamp');
  stamp.textContent = profile.updatedAt
    ? `最後更新 · ${new Date(profile.updatedAt).toLocaleString('zh-TW',{hour12:false})}`
    : '尚未建立記錄';

  bindEvents();
}

function renderPortrait(){
  const wrap = document.getElementById('portraitWrap');
  const img = document.getElementById('portraitImg');
  const placeholder = document.getElementById('portraitPlaceholder');

  wrap.querySelectorAll('.remove-photo').forEach(b => b.remove());

  if(profile.photo){
    img.src = profile.photo;
    img.style.display = 'block';
    placeholder.style.display = 'none';
  }else{
    img.style.display = 'none';
    placeholder.style.display = 'flex';
  }

  wrap.classList.toggle('editable', editing);
  wrap.onclick = editing ? () => document.getElementById('portraitFile').click() : null;

  if(editing && profile.photo){
    const rm = document.createElement('button');
    rm.className = 'remove-photo';
    rm.textContent = '✕';
    rm.title = '移除照片';
    rm.onclick = (ev) => { ev.stopPropagation(); profile.photo = ''; silentSave(); };
    wrap.appendChild(rm);
  }
}

function renderGallery(){
  const el = document.getElementById('galleryGrid');
  let html = profile.gallery.map((src, i) => `
    <div class="gallery-tile">
      <img src="${src}" alt="回憶照片">
      ${editing ? `<button class="remove-photo" data-del-gallery="${i}" title="移除照片">✕</button>` : ''}
    </div>`).join('');

  if(editing){
    html += `<div class="gallery-tile add-tile" id="addGalleryTile">＋</div>`;
  }
  if(!editing && profile.gallery.length === 0){
    html = `<div class="gallery-empty">還沒有照片</div>`;
  }
  el.innerHTML = html;

  el.querySelectorAll('[data-del-gallery]').forEach(btn => {
    btn.onclick = () => {
      profile.gallery.splice(+btn.dataset.delGallery, 1);
      silentSave();
    };
  });
  const addTile = document.getElementById('addGalleryTile');
  if(addTile) addTile.onclick = () => document.getElementById('galleryFile').click();
}

function renderHeader(){
  const nameEl = document.getElementById('nameDisplay');
  const subEl = document.getElementById('subtitleDisplay');
  const tabEl = document.getElementById('tabLabel');

  tabEl.textContent = profile.tag || '記事卡';

  if(editing){
    nameEl.innerHTML = `<input id="nameInput" placeholder="姓名" value="${esc(profile.name)}">`;
    subEl.innerHTML = `<input id="tagInput" placeholder="標籤，例如：寶貝／家人" value="${esc(profile.tag)}" style="margin-right:8px;width:48%;">
                        <input id="subInput" placeholder="一句話備註" value="${esc(profile.subtitle)}" style="width:48%;">`;
  }else{
    nameEl.textContent = profile.name || '（尚未命名）';
    subEl.textContent = profile.subtitle || '';
  }
}

function renderGroup(containerId, defs, data){
  const el = document.getElementById(containerId);
  el.innerHTML = defs.map(def => {
    const raw = data[def.key] || '';
    if(editing){
      if(def.type === 'list'){
        return `<div class="row">
          <div class="label">${def.label}</div>
          <textarea data-group="${containerId}" data-key="${def.key}" data-type="list" placeholder="每行一項">${esc((Array.isArray(raw)?raw.join('\n'):raw))}</textarea>
        </div>`;
      }
      const inputType = def.type === 'date' ? 'date' : 'text';
      return `<div class="row">
        <div class="label">${def.label}</div>
        <input type="${inputType}" data-group="${containerId}" data-key="${def.key}" value="${esc(Array.isArray(raw)?raw.join(', '):raw)}">
      </div>`;
    }else{
      let display = Array.isArray(raw) ? raw.filter(Boolean).join('\n') : raw;
      if(def.type === 'date' && display) display = fmtDate(display);
      if(def.key === 'birthday' && raw){
        const d = new Date(raw+'T00:00:00');
        if(!isNaN(d)){
          const sign = zodiacWestern(d.getMonth()+1, d.getDate());
          const animal = chineseZodiac(d.getFullYear());
          display = `${display} ・ ${sign} ・ 屬${animal}`;
        }
      }
      const isEmpty = !display;
      return `<div class="row ${isEmpty?'empty':''}">
        <div class="label">${def.label}</div>
        <div class="value">${isEmpty ? '未填寫' : esc(display)}</div>
      </div>`;
    }
  }).join('');
}

function renderLinks(){
  const el = document.getElementById('linkFields');
  if(profile.links.length === 0 && !editing){
    el.innerHTML = `<div class="row empty"><div class="label">連結</div><div class="value">未填寫</div></div>`;
    return;
  }
  el.innerHTML = profile.links.map((lk, i) => {

      return `<div class="link-row">
        <div class="link-edit">
          <input class="label-input" data-link-idx="${i}" data-link-field="label" value="${esc(lk.label)}" placeholder="名稱">
          <input data-link-idx="${i}" data-link-field="url" value="${esc(lk.url)}" placeholder="https://...">
          <button class="del-field" data-del-link="${i}">✕</button>
        </div>
      </div>`;
    }else{
      return `<div class="link-row link-line">
        <div class="link-label">${esc(lk.label||'連結')}</div>

}

function renderCustom(){
  const el = document.getElementById('customFields');
  if(profile.custom.length === 0 && !editing){
    el.innerHTML = `<div class="row empty"><div class="label">備註</div><div class="value">未填寫</div></div>`;
    return;
  }
  el.innerHTML = profile.custom.map((f, i) => {

        <input style="flex:0 0 78px;font-size:12px;padding:6px 8px;" data-custom-idx="${i}" data-custom-field="label" value="${esc(f.label)}" placeholder="欄位名稱">

      </div>`;
    }else{

function collectFromDOM(){
  document.querySelectorAll('[data-group]').forEach(inp => {
    const group = inp.dataset.group === 'basicFields' ? 'basic'
                : inp.dataset.group === 'lifeFields' ? 'life' : 'us';
    const key = inp.dataset.key;
    if(inp.dataset.type === 'list'){
      profile[group][key] = inp.value.split('\n').map(s=>s.trim()).filter(Boolean);
    }else{
      profile[group][key] = inp.value.trim();
    }
  });
  const nameInput = document.getElementById('nameInput');
  const tagInput = document.getElementById('tagInput');
  const subInput = document.getElementById('subInput');
  if(nameInput) profile.name = nameInput.value.trim();
  if(tagInput) profile.tag = tagInput.value.trim();
  if(subInput) profile.subtitle = subInput.value.trim();

  document.querySelectorAll('[data-link-idx]').forEach(inp => {
    const i = +inp.dataset.linkIdx;
    const field = inp.dataset.linkField;
    if(profile.links[i]) profile.links[i][field] = inp.value.trim();
  });
  document.querySelectorAll('[data-custom-idx]').forEach(inp => {
    const i = +inp.dataset.customIdx;
    const field = inp.dataset.customField;
    if(profile.custom[i]) profile.custom[i][field] = inp.value.trim();
  });
}

function bindEvents(){
  document.getElementById('portraitFile').onchange = async (e) => {
    const file = e.target.files[0];
    e.target.value = '';
    if(!file) return;
    try{
      profile.photo = await compressImage(file, 500, 0.82);
      silentSave();
    }catch(err){
      alert('這張照片讀取失敗，換一張試試看。');
    }
  };
  document.getElementById('galleryFile').onchange = async (e) => {
    const files = Array.from(e.target.files || []);
    e.target.value = '';
    if(!files.length) return;
    try{
      for(const f of files){
        const compressed = await compressImage(f, 900, 0.72);
        profile.gallery.push(compressed);
      }
      silentSave();
    }catch(err){
      alert('有照片讀取失敗，其餘的已經加入了。');
      silentSave();
    }
  };
  document.getElementById('exportBtn').onclick = () => {
    if(editing) collectFromDOM();
    exportBackup();
  };
  document.getElementById('importBtn').onclick = () => {
    document.getElementById('importFile').click();
  };
  document.getElementById('importFile').onchange = (e) => {
    const file = e.target.files[0];
    if(file){
      if(confirm('匯入備份將覆蓋目前的資料，確定要繼續嗎？')){
        importBackup(file);
      }
    }
    e.target.value = '';
  };
  document.getElementById('editToggle').onclick = () => {
    if(editing){ load(); return; }
    editing = true; render();
  };
  const saveBtn = document.getElementById('saveBtn');
  if(saveBtn) saveBtn.onclick = () => { collectFromDOM(); save(); };
  const resetBtn = document.getElementById('resetBtn');
  if(resetBtn) resetBtn.onclick = () => {
    if(confirm('確定要清空所有記錄嗎？此動作無法復原。')){
      profile = defaultProfile();
      save();
    }
  };
  const addLinkBtn = document.getElementById('addLinkBtn');
  if(addLinkBtn) addLinkBtn.onclick = () => {
    collectFromDOM();
    profile.links.push({label:'', url:''});
    render();
  };
  const addCustomBtn = document.getElementById('addCustomBtn');
  if(addCustomBtn) addCustomBtn.onclick = () => {
    collectFromDOM();
    profile.custom.push({label:'', value:''});
    render();
  };
  document.querySelectorAll('[data-del-link]').forEach(btn => {
    btn.onclick = () => {
      collectFromDOM();
      profile.links.splice(+btn.dataset.delLink, 1);
      render();
    };
  });
  document.querySelectorAll('[data-del-custom]').forEach(btn => {
    btn.onclick = () => {
      collectFromDOM();
      profile.custom.splice(+btn.dataset.delCustom, 1);
      render();
    };
  });
}

/* ===================== 鎖定功能 ===================== */

function loadLockSettings(){
  try{
    const raw = localStorage.getItem(LOCK_KEY);
    if(raw) lockSettings = Object.assign(lockSettings, JSON.parse(raw));
  }catch(e){ /* ignore, use defaults */ }
}
function saveLockSettings(){
  try{
    localStorage.setItem(LOCK_KEY, JSON.stringify(lockSettings));
  }catch(e){
    alert('鎖定設定儲存失敗');
  }
}

async function sha256Hex(str){
  const enc = new TextEncoder().encode(str);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
function randomHex(len){
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function setPin(pin){
  lockSettings.salt = randomHex(16);
  lockSettings.pinHash = await sha256Hex(lockSettings.salt + pin);
}
async function verifyPin(pin){
  if(!lockSettings.pinHash) return false;
  return (await sha256Hex(lockSettings.salt + pin)) === lockSettings.pinHash;
}

function bufToBase64(buf){ return btoa(String.fromCharCode(...new Uint8Array(buf))); }
function base64ToBuf(b64){
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}

async function biometricAvailable(){
  try{
    return !!(window.PublicKeyCredential &&
      await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable());
  }catch(e){ return false; }
}

async function registerBiometric(){
  const cred = await navigator.credentials.create({
    publicKey: {
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      rp: { name: '個人記事卡' },
      user: { id: crypto.getRandomValues(new Uint8Array(16)), name: 'person-card', displayName: '個人記事卡' },
      pubKeyCredParams: [{alg:-7, type:'public-key'}, {alg:-257, type:'public-key'}],
      authenticatorSelection: { authenticatorAttachment:'platform', userVerification:'required' },
      timeout: 60000,
    }
  });
  lockSettings.credId = bufToBase64(cred.rawId);
}

async function verifyBiometric(){
  if(!lockSettings.credId) throw new Error('未設定生物辨識');
  await navigator.credentials.get({
    publicKey: {
      challenge: crypto.getRandomValues(new Uint8Array(32)),
      allowCredentials: [{ id: base64ToBuf(lockSettings.credId), type:'public-key' }],
      userVerification: 'required',
      timeout: 60000,
    }
  });
  return true; // resolved without throwing = verification succeeded
}

function showLockOverlay(){
  document.getElementById('lockOverlay').style.display = 'flex';
  document.getElementById('lockError').textContent = '';
  document.getElementById('lockPinInput').value = '';
  document.getElementById('lockBioBtn').style.display =
    (lockSettings.useBiometric && lockSettings.credId) ? 'block' : 'none';
}
function hideLockOverlay(){
  document.getElementById('lockOverlay').style.display = 'none';
}
function unlockSuccess(){
  sessionUnlocked = true;
  hideLockOverlay();
  load();
}
async function tryBiometricUnlock(){
  try{
    await verifyBiometric();
    unlockSuccess();
  }catch(e){
    document.getElementById('lockError').textContent = 'Face ID／Touch ID 驗證失敗，請輸入密碼';
  }
}
async function tryPinUnlock(){
  const pin = document.getElementById('lockPinInput').value;
  if(await verifyPin(pin)){
    unlockSuccess();
  }else{
    document.getElementById('lockError').textContent = '密碼錯誤，請再試一次';
  }
}

async function renderLockSettingsBody(){
  const bioAvail = await biometricAvailable();
  const el = document.getElementById('lockSettingsBody');
  el.innerHTML = `
    <div class="row">
      <div class="label">開啟鎖定</div>
      <div class="value"><input type="checkbox" id="lockEnableChk" ${lockSettings.enabled?'checked':''}></div>
    </div>
    <div id="lockPinFields" style="${lockSettings.enabled?'':'display:none;'}">
      <div class="row"><div class="label">設定密碼</div>
        <input type="password" inputmode="numeric" id="newPin1" placeholder="4-8 位數字" class="lock-pin-input" style="width:100%;text-align:right;">
      </div>
      <div class="row"><div class="label">再輸入一次</div>
        <input type="password" inputmode="numeric" id="newPin2" placeholder="再輸入一次" class="lock-pin-input" style="width:100%;text-align:right;">
      </div>
      ${bioAvail ? `<div class="row"><div class="label">Face ID／Touch ID</div>
        <div class="value"><input type="checkbox" id="lockBioChk" ${lockSettings.useBiometric?'checked':''}></div></div>` : ''}
    </div>
    <div class="hint">${lockSettings.pinHash ? '已設定過密碼，若下面留白就沿用原本的密碼' : '密碼是 Face ID／Touch ID 無法使用時的備用解鎖方式，一定要設定'}</div>
  `;
  const enableChk = document.getElementById('lockEnableChk');
  enableChk.onchange = (e) => {
    document.getElementById('lockPinFields').style.display = e.target.checked ? 'block' : 'none';
  };
}

function openLockSettings(){
  renderLockSettingsBody();
  document.getElementById('lockSettingsOverlay').style.display = 'flex';
}
function closeLockSettings(){
  document.getElementById('lockSettingsOverlay').style.display = 'none';
}

function setupLockUI(){
  document.getElementById('lockSettingsBtn').onclick = openLockSettings;
  document.getElementById('lockSettingsClose').onclick = closeLockSettings;
  document.getElementById('lockBioBtn').onclick = tryBiometricUnlock;
  document.getElementById('lockPinSubmit').onclick = tryPinUnlock;
  document.getElementById('lockPinInput').onkeydown = (e) => {
    if(e.key === 'Enter') tryPinUnlock();
  };

  document.getElementById('lockSettingsSave').onclick = async () => {
    const enable = document.getElementById('lockEnableChk').checked;
    if(!enable){
      lockSettings = { enabled:false, salt:null, pinHash:null, useBiometric:false, credId:null };
      saveLockSettings();
      closeLockSettings();
      return;
    }
    const p1 = document.getElementById('newPin1').value;
    const p2 = document.getElementById('newPin2').value;
    if(p1 || p2){
      if(p1.length < 4){ alert('密碼至少要 4 位數'); return; }
      if(p1 !== p2){ alert('兩次輸入的密碼不一致'); return; }
      await setPin(p1);
    }
    if(!lockSettings.pinHash){ alert('請先設定一組密碼'); return; }

    const bioChk = document.getElementById('lockBioChk');
    const wantBio = bioChk ? bioChk.checked : false;
    if(wantBio && !lockSettings.credId){
      try{
        await registerBiometric();
      }catch(e){
        alert('Face ID／Touch ID 設定失敗，先只用密碼鎖，可以之後再來開啟');
        lockSettings.useBiometric = false;
        lockSettings.enabled = true;
        saveLockSettings();
        closeLockSettings();
        return;
      }
    }
    lockSettings.useBiometric = wantBio;
    lockSettings.enabled = true;
    saveLockSettings();
    closeLockSettings();
    alert('鎖定已啟用，下次打開就會需要驗證');
  };

  // re-lock after the app has been backgrounded for a while (grace period so
  // the iOS photo picker used for portrait/gallery uploads doesn't trigger a re-lock)
  document.addEventListener('visibilitychange', () => {
    if(document.hidden){
      hiddenAt = Date.now();
    }else if(lockSettings.enabled && sessionUnlocked && hiddenAt){
      const away = Date.now() - hiddenAt;
      if(away > 15000){
        sessionUnlocked = false;
        showLockOverlay();
      }
      hiddenAt = null;
    }
  });
}

/* ===================== 啟動流程 ===================== */

setupLockUI();
loadLockSettings();
if(lockSettings.enabled){
  showLockOverlay();
  if(lockSettings.useBiometric && lockSettings.credId){
    tryBiometricUnlock();
  }
}else{
  load();
}
